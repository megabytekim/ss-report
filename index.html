<style>

  *{box-sizing:border-box}

  a.report:hover{border-color:var(--accent);background:var(--card2);transform:translateY(-1px)}
  .date{font-size:12px;color:var(--dim);font-variant-numeric:tabular-nums;margin-bottom:5px}
  .rtitle{font-size:16.5px;font-weight:600;margin-bottom:5px}
  .rdesc{font-size:13.5px;color:var(--mut)}
  .arrow{float:right;color:var(--dim);font-size:18px;margin-top:-2px}
